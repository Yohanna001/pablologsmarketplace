<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Early interceptor for sandboxed preview HMR/WebSocket benign rejections
      (function() {
        window.addEventListener('unhandledrejection', function(event) {
          try {
            const reason = event.reason;
            const message = (reason && (reason.message || reason.description)) || String(reason || '');
            if (
              message.toLowerCase().includes('websocket') || 
              message.toLowerCase().includes('socket') ||
              message.toLowerCase().includes('failed to connect') ||
              message.includes('WebSocket')
            ) {
              event.preventDefault();
              event.stopImmediatePropagation();
            }
          } catch (e) {}
        }, true);

        window.addEventListener('error', function(event) {
          try {
            const message = event.message || '';
            if (
              message.toLowerCase().includes('websocket') || 
              message.toLowerCase().includes('socket') ||
              message.toLowerCase().includes('failed to connect') ||
              message.includes('WebSocket')
            ) {
              event.preventDefault();
              event.stopImmediatePropagation();
            }
          } catch (e) {}
        }, true);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700&display=swap" rel="stylesheet font-sans">
    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <title>Pablologsmarketplace | Premium Accounts Marketplace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
